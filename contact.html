<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Raphaël Bousbia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav>
        <a href="index.html" class="nav-brand">Raphaël Bousbia</a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="articles.html">Articles</a></li>
            <li><a href="locations.html">Parcours</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-wrapper">
        <div class="contact-intro">
            <h1>Entrons en contact</h1>
            <p>Pour toute question relative à mes travaux de recherche, à mon parcours, ou simplement pour échanger, n'hésitez pas à m'écrire.</p>
        </div>
        <div>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" placeholder="Votre nom">
            </div>
            <div class="form-group">
                <label>Adresse e-mail</label>
                <input type="email" placeholder="vous@exemple.com">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea placeholder="Votre message..."></textarea>
            </div>
            <button class="form-submit">Envoyer</button>
        </div>
    </div>

    <footer>
        <ul class="footer-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="articles.html">Articles</a></li>
            <li><a href="locations.html">Parcours</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <span>Raphaël Bousbia &mdash; 2026</span>
    </footer>

</body>
</html>
